device: cuda  # Device to run the model on (e.g., "cuda", "cpu")
embed: true  # Whether to compute embeddings
embedding_model: "DINOv3"  # Embedding model to use
batch_size: 16  # Batch size for processing
visualize: false  # Whether to visualize results
output_dir: "/home/lmeyers/esporas/outputs"  # Directory to save output files
save_images: false  # Whether to save processed images
output_csv: "/home/lmeyers/esporas/results.csv"  # Path to save the output CSV file
  
